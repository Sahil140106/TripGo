<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripGo - Token Passbook</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="token.css">
    <script src="config.js"></script>
    <script src="auth.js"></script>
</head>
<body>

    <nav class="navbar">
       <a href="index.html" class="logo">
            <img src="logo-removebg-preview.png" alt="TripGo Logo" class="nav-logo-img">
        </a>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="#">How It Works</a>
            <a href="javascript:void(0)" onclick="requireAuth('browsecar.html')">Browse Cars</a>
            <a href="#">About</a>
        </div>

        <div class="nav-auth" id="nav-auth-section">
            <a href="login.html" class="btn-outline">Login</a>
            <a href="signup.html">
                <button class="SignUp-btn">SignUp</button>
            </a>
        </div>

        <button id="menu-btn" class="mobile-toggle">
            <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
    </nav>

    <main class="main-content">
        <header class="header">
            <h1>📖 Token Passbook</h1>
            <p>Complete history of your TripGo Tokens</p>
        </header>

        <section class="balance-card">
            <div class="balance-left">
                <span class="label">Current Balance</span>
                <h2 id="total-tokens">340 Tokens</h2>
            </div>
            <div class="balance-right">
                Worth ₹3,400
            </div>
        </section>

        <section class="history-container">
            <div class="history-header">Transaction History</div>
            <div id="transaction-list">
                </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 TripGo. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="profile.js"></script>
    <script src="token.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            const authSection = document.getElementById('nav-auth-section');
            
            if (user) {
                authSection.innerHTML = `
                    <div class="user-profile-container">
                        <div class="icon-btn profile-trigger" id="profile-trigger">
                        </div>
                        <div class="profile-dropdown" id="profile-dropdown">
                            <div class="dropdown-header">
                                <span></span>
                                <small></small>
                            </div>
                            <a href="${user.role === 'ADMIN' ? 'admin.html' : 'profile.html'}" class="dropdown-item">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                My Profile
                            </a>
                            <div class="dropdown-divider"></div>
                            <a href="#" onclick="logout()" class="dropdown-item logout">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                                Logout
                            </a>
                        </div>
                    </div>
                `;
                updateAllProfileIcons();
                const trigger = document.getElementById('profile-trigger');
                const dropdown = document.getElementById('profile-dropdown');
                if(trigger && dropdown){
                    trigger.addEventListener('click', (e) => {
                        e.stopPropagation();
                        dropdown.classList.toggle('active');
                    });
                    document.addEventListener('click', () => {
                        dropdown.classList.remove('active');
                    });
                }
            }
        });
    </script>
</body>
</html>
