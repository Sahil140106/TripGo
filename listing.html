<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripGo - List Your Car</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        // Enforce authentication immediately
        auth.requireAuth('listing.html');
    </script>
</head>
<body>

<div class="form-container">
    <div class="logo">
        <img src="logo-removebg-preview.png" alt="TripGo Logo">
    </div>
    <header class="form-header">
        <h1>List Your Car</h1>
        <p>Follow these 5 steps to start earning from your car.</p>
    </header>

    <form id="carListingForm">
        <div class="form-section">
            <h3>1. Car Identity (Pehchaan)</h3>
            <div class="grid-2">
                <div class="input-group">
                    <label>Car Brand</label>
                    <input type="text" id="carBrand" placeholder="e.g. Hyundai" required>
                </div>
                <div class="input-group">
                    <label>Car Model</label>
                    <input type="text" id="carModel" placeholder="e.g. Creta 2024" required>
                </div>
            </div>
            <div class="input-group">
                <label>Registration Number (Car No.)</label>
                <input type="text" id="regNumber" placeholder="MH 12 AB 1234" required>
            </div>
            <div class="input-group">
                <label>Car Photos</label>
                <input type="file" id="carImage" class="file-input" accept="image/*">
            </div>
        </div>

        <div class="form-section">
            <h3>2. Ownership & Legal</h3>
            <div class="grid-2">
                <div class="input-group">
                    <label>RC Book (Upload PDF/Image)</label>
                    <input type="file" required>
                </div>
                <div class="input-group">
                    <label>Insurance Expiry Date</label>
                    <input type="date" required>
                </div>
            </div>
            <div class="input-group">
                <label>Owner Aadhaar / DL</label>
                <input type="file" id="ownerDoc" required>
            </div>
            <div class="grid-2">
                <div class="input-group">
                    <label>Owner Name</label>
                    <input type="text" id="ownerName" placeholder="e.g. Sahil Yadav" required>
                </div>
                <div class="input-group">
                    <label>Owner Email</label>
                    <input type="email" id="ownerEmail" placeholder="e.g. sahil@example.com" required>
                </div>
            </div>
            <div class="grid-2">
                <div class="input-group">
                    <label>PUC Status</label>
                    <select id="pucStatus">
                        <option>Valid</option>
                        <option>Expired</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>3. Basic Usage Info</h3>
            <div class="grid-2">
                <div class="input-group">
                    <label>Fuel Type</label>
                    <select id="fuelType">
                        <option>Petrol</option>
                        <option>Diesel</option>
                        <option>EV</option>
                        <option>CNG</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Car Type</label>
                    <select id="carType">
                        <option value="SUV">SUV</option>
                        <option value="Sedan">Sedan</option>
                        <option value="Hatchback">Hatchback</option>
                        <option value="Luxury">Luxury</option>
                    </select>
                </div>
            </div>
            <div class="grid-2" style="margin-top: 15px;">
                <div class="input-group">
                    <label>Transmission</label>
                    <select id="transmission">
                        <option>Manual</option>
                        <option>Automatic</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Seating</label>
                    <input type="number" id="seating" value="5">
                </div>
                <div class="input-group">
                    <label>Luggage (No. of Bags)</label>
                    <input type="number" id="luggage" value="2">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>4. Pricing & 5. Location</h3>
            <div class="grid-2">
                <div class="input-group">
                    <label>Price per Day (₹)</label>
                    <input type="number" id="pricePerDay" placeholder="2500" required>
                </div>
                <div class="input-group">
                    <label>Refundable Deposit (₹)</label>
                    <input type="number" id="refundableDeposit" placeholder="5000">
                </div>
            </div>
            <div class="input-group" style="flex-direction: row; align-items: center; gap: 10px; margin-bottom: 10px; background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px dashed #cbd5e1;">
                <input type="checkbox" id="allowHandover" checked style="width: 20px; height: 20px; cursor: pointer;">
                <label for="allowHandover" style="margin: 0; cursor: pointer; font-weight: 700; color: #1e293b;">Allow Trip Handover (Enable reverse renting for this car)</label>
            </div>
            <div class="input-group" style="background: #f0fdf4; padding: 15px; border-radius: 12px; border: 1px dashed #22c55e; margin-bottom: 20px;">
                <label style="margin-bottom: 10px; font-weight: 700; color: #166534; display: block;">Fuel Charges Preference</label>
                <div style="display: flex; gap: 20px; align-items: center;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: #166534; font-weight: 600;">
                        <input type="radio" name="fuelOption" value="include" checked style="width: 18px; height: 18px; cursor: pointer;">
                        Include (Fuel cover by owner)
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: #166534; font-weight: 600;">
                        <input type="radio" name="fuelOption" value="exclude" style="width: 18px; height: 18px; cursor: pointer;">
                        Exclude (Renter pays for fuel)
                    </label>
                </div>
            </div>
            <div class="input-group" style="margin-bottom: 20px;">
                <label style="font-weight: 700; color: #1e293b;">Near by Hub (Recommended for Handover return)</label>
                <select id="nearbyHub" style="width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; outline: none;">
                    <option value="" disabled selected>Select a hub...</option>
                    <option value="IGI Airport T3, Delhi">Indira Gandhi International Airport (T3)</option>
                    <option value="New Delhi Railway Station">New Delhi Railway Station</option>
                    <option value="Rajiv Chowk Metro Station">Rajiv Chowk Metro Station</option>
                    <option value="Noida City Centre">Noida City Centre</option>
                    <option value="Cyber Hub, Gurgaon">Cyber Hub, Gurgaon</option>
                    <option value="Pune Airport">Pune Airport</option>
                    <option value="Mumbai Central">Mumbai Central</option>
                </select>
            </div>
            <div class="input-group">
                <label>Pickup Location</label>
                <input type="text" id="pickupLocation" placeholder="Enter Area / City" required>
            </div>
        </div>

        <button type="submit" class="submit-btn">List My Car Now</button>
        <div style="text-align: center; margin-top: 15px;">
            <a href="index.html" style="text-decoration: none; color: #555; font-size: 14px;">Back to Home</a>
        </div>
    </form>
</div>

    <script src="profile.js"></script>
    <script src="listing.js"></script>
</body>
</html>
