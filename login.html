<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripGo | Login</title>
    <script src="config.js"></script>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="signup-container">
        <div class="logo">
            <a href="index.html"><img src="logo-removebg-preview.png" alt="TripGo"></a>
        </div>
        <h2>Welcome Back</h2>
        <p>Login to your TripGo account to continue.</p>

        <div class="role-selector">
            <button class="role-btn active" data-role="user">Renter</button>
            <button class="role-btn" data-role="admin">Admin</button>
        </div>

        <form id="loginForm">
            <div id="dynamic-login-fields">
                <!-- Fields populated by auth.js -->
                <div class="form-group">
                    <label>Email, Username, or Mobile</label>
                    <input type="text" placeholder="Enter Email, Username, or Mobile" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
            </div>

            <div id="error-message" style="color: #ef4444; font-size: 13px; margin-bottom: 15px; display: none;"></div>
            
            <div style="text-align: right; margin-bottom: 15px;">
                <a href="#" id="forgot-password-link" style="color: #2563eb; font-size: 13px; text-decoration: none; font-weight: 600;">Forgot Password?</a>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn" style="margin-top: 0;">Login</button>
        </form>

        <!-- Reset Password Section -->
        <div id="reset-password-section" style="display: none; margin-top: 25px; border-top: 1px dashed #e2e8f0; padding-top: 20px; text-align: left;">
            <h3 style="font-size: 18px; color: #1e293b; margin-bottom: 10px;">Reset Password</h3>
            <p style="font-size: 13px; color: #64748b; margin-bottom: 15px;">Enter your registered email to receive an OTP.</p>
            
            <div class="form-group">
                <label>Registered Email</label>
                <input type="email" id="reset-email" placeholder="example@mail.com">
            </div>

            <div id="reset-otp-group" style="display: none;">
                <div class="form-group">
                    <label>Enter 6-Digit OTP</label>
                    <input type="text" id="reset-otp" placeholder="000000" maxlength="6">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="reset-new-password" placeholder="••••••••">
                        <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility(this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
            </div>

            <button type="button" class="submit-btn" id="send-reset-otp-btn">Send OTP</button>
            <button type="button" class="submit-btn" id="verify-reset-btn" style="display: none; background: #10b981;">Reset Password</button>
            
            <button type="button" id="cancel-reset-btn" style="width: 100%; padding: 10px; margin-top: 10px; border: none; background: transparent; color: #64748b; font-size: 13px; cursor: pointer;">Cancel</button>
        </div>

        <div class="footer-text">
            Don't have an account? <a href="signup.html">Register</a>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
