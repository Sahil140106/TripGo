<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripGo - My Bookings</title>
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="bookings.css">
    <script src="config.js"></script>
    <script src="auth.js"></script>
</head>
<body>

    <div class="main-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                    <div class="profile-avatar" id="profileAvatar">SY</div>
                    <div class="profile-info">
                        <h3 id="userName">Sahil Yadav</h3>
                        <p>Premium Member</p>
                    </div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="profile.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    <span>Dashboard</span>
                </a>
                <a href="bookings.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><path d="M12 1v6m0 6v6"></path><path d="M4.22 4.22l4.24 4.24m5.08 5.08l4.24 4.24"></path><path d="M1 12h6m6 0h6"></path><path d="M4.22 19.78l4.24-4.24m5.08-5.08l4.24-4.24"></path></svg>
                    <span>Bookings</span>
                </a>
                <a href="vehicles.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"></path><circle cx="7" cy="17" r="2"></circle><path d="M9 17h6"></path><circle cx="17" cy="17" r="2"></circle></svg>
                    <span>My Vehicles</span>
                </a>
                <a href="#" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    <span>Messages</span>
                </a>
                <a href="#" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10M16 3v4m-8-4v4"></path><path d="M3 12h18M16 16l2 2 4-4"></path></svg>
                    <span>Transactions</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 3 16 7 12 7"></polyline><path d="M15 13H9m6-4H9m6 4H9m6 4H9"></path></svg>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <div class="dashboard-container">
            <header>
                <h1>My Bookings</h1>
            </header>

            <div class="bookings-filter">
                <div class="filter-group">
                    <label>Status:</label>
                    <select id="statusFilter">
                        <option value="all">All Bookings</option>
                        <option value="approved">Approved</option>
                        <option value="pending">Pending</option>
                        <option value="completed">Completed</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
            </div>

            <div class="bookings-grid" id="bookingsGrid">
            </div>
        </div>
    </div>

    <div class="booking-modal-overlay" id="bookingModalOverlay">
        <div class="booking-modal">
            <div class="booking-modal-header">
                <h2>Booking Details</h2>
                <button class="modal-close" id="closeBookingModal">×</button>
            </div>
            <div class="booking-modal-content" id="bookingModalContent">
                <div class="car-image-container">
                    <img id="modalCarImage" src="" alt="Car" class="car-modal-image">
                </div>
                <div class="booking-detail-card">
                    <div class="detail-row">
                        <span class="detail-label">Car:</span>
                        <span class="detail-value" id="modalCar"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Dates:</span>
                        <span class="detail-value" id="modalDates"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Total Amount:</span>
                        <span class="detail-value amount" id="modalTotal"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Status:</span>
                        <span class="detail-value" id="modalStatus"></span>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="action-btn primary">View Invoice</button>
                    <button class="action-btn secondary">Contact Support</button>
                </div>
            </div>
        </div>
    </div>

    <script src="profile.js"></script>
    <script src="bookings.js"></script>
</body>
</html>
