<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripGo | Registration</title>
    <link rel="stylesheet" href="signup.css">
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="signup-container">
        <div class="logo">
            <a href="index.html"><img src="logo-removebg-preview.png" alt="TripGo"></a>
        </div>
        <h2 id="form-title">Create Account</h2>
        <p>Join the TripGo community today.</p>

        <div class="role-selector">
            <button class="role-btn active" data-role="user">Renter</button>
            <button class="role-btn" data-role="admin">Admin</button>
        </div>

        <form id="signupForm">
            <div id="dynamic-fields">
                <!-- Fields populated by auth.js -->
                <h4>Personal & Identity</h4>
                <div class="form-group"><label>Full Name</label><input type="text" placeholder="Full Name" required></div>
                <div class="form-group"><label>Mobile Number</label><input type="tel" placeholder="Mobile Number" required></div>
                <div class="form-group"><label>Email ID</label><input type="email" placeholder="Email ID" required></div>
                <div class="form-group"><label>Password</label><input type="password" placeholder="Password" required></div>
                <div class="form-group"><label>Confirm Password</label><input type="password" placeholder="Confirm Password" required></div>
            </div>

            <div id="otp-section" style="display: none; margin-top: 20px; border-top: 1px dashed #e2e8f0; padding-top: 15px;">
                <div class="form-group">
                    <label>Enter 6-Digit OTP</label>
                    <input type="text" id="otp-input" placeholder="000000" maxlength="6">
                </div>
                <button type="button" class="submit-btn" id="verify-otp-btn" style="background: #10b981;">Verify OTP</button>
            </div>

            <div id="error-message" style="color: #ef4444; font-size: 13px; margin-bottom: 15px; display: none;"></div>
            
            <button type="button" class="submit-btn" id="send-otp-btn">Sign In</button>
            <button type="submit" class="submit-btn" id="submit-btn" style="display: none; background: var(--primary-blue-gradient);">Complete Registration</button>
        </form>

        <div class="footer-text">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
